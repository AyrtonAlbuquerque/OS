[general]
compat-delete='delete-sequence'
display-n=0
display-tab-names=0
gtk-theme-name='OneDark'
gtk-use-system-default-theme=false
hide-tabs-if-one-tab=false
history-size=1000
max-tab-name-length=100
mouse-display=true
open-tab-cwd=true
prompt-on-quit=false
quick-open-command-line='gedit %(file_path)s'
restore-tabs-notify=true
restore-tabs-startup=true
save-tabs-when-changed=true
scroll-keystroke=true
start-at-login=true
use-default-font=true
use-popup=false
use-scrollbar=false
use-trayicon=false
window-halignment=0
window-height=50
window-losefocus=false
window-ontop=false
window-refocus=false
window-tabbar=false
window-width=100

[keybindings/global]
show-hide='<Super>grave'

[style]
cursor-shape=1

[style/background]
transparency=100

[style/font]
allow-bold=true
palette='#000000000000:#b0b058586969:#7676a6a66565:#cfcfb0b07373:#4a4aa4a4b8b8:#a1a16565c1c1:#4a4aa4a4b8b8:#b1b1b1b1b1b1:#5e5e5c5c6464:#b0b058586969:#7676a6a66565:#cfcfb0b07373:#4a4aa4a4b8b8:#a1a16565c1c1:#4a4aa4a4b8b8:#dededededede:#dededededede:#28272c2c3434'
palette-name='Custom'